services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_search_postgres
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: knowledge_base
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init_schemas.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./migrations/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d knowledge_base"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: